<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Starfish</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <!-- Login Screen -->
  <div id="login-screen" class="screen">
    <div class="login-box">
      <h1 class="logo">Starfish</h1>
      <form id="login-form">
        <input type="password" id="password" placeholder="Password" autocomplete="current-password" />
        <button type="submit">Enter</button>
      </form>
      <p id="login-error" class="error hidden">Incorrect password</p>
    </div>
  </div>

  <!-- Library Screen -->
  <div id="library-screen" class="screen hidden">
    <header>
      <h1 class="logo">Starfish</h1>
      <div class="header-actions">
        <div class="search-box">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" id="search-input" placeholder="Search..." />
        </div>
        <select id="sort-select" class="sort-select" title="Sort">
          <option value="date-desc">Newest</option>
          <option value="date-asc">Oldest</option>
          <option value="name-asc">Name A-Z</option>
          <option value="name-desc">Name Z-A</option>
          <option value="size-desc">Largest</option>
          <option value="size-asc">Smallest</option>
        </select>
        <button id="upload-btn" class="icon-btn" title="Upload">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
        </button>
        <button id="new-folder-btn" class="icon-btn" title="New Folder">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/>
            <line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/>
          </svg>
        </button>
        <button id="logout-btn" class="icon-btn" title="Logout">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
            <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Breadcrumb -->
    <nav id="breadcrumb" class="breadcrumb">
      <span class="breadcrumb-item" data-prefix="">Home</span>
    </nav>

    <div id="video-grid" class="video-grid"></div>
    <p id="empty-msg" class="empty-msg hidden">No videos uploaded yet</p>
  </div>

  <!-- Upload Modal -->
  <div id="upload-modal" class="modal hidden">
    <div class="modal-header">
      <span>Upload Videos</span>
      <button id="close-upload" class="icon-btn" title="Close">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="upload-body">
      <div id="drop-zone" class="drop-zone">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <p>Drag & drop videos here</p>
        <p class="text-dim">or click to select files</p>
        <input type="file" id="file-input" multiple accept="video/*" />
      </div>
      <div id="upload-list" class="upload-list"></div>
    </div>
  </div>

  <!-- Video Player Modal -->
  <div id="player-modal" class="modal hidden">
    <div class="modal-header">
      <span id="player-title"></span>
      <button id="close-player" class="icon-btn" title="Close">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="player-wrapper">
      <video id="video-player" controls playsinline></video>
    </div>
  </div>

  <!-- Delete Confirm Dialog -->
  <div id="confirm-dialog" class="confirm-dialog hidden">
    <div class="confirm-box">
      <p id="confirm-msg">Delete this video?</p>
      <div class="confirm-actions">
        <button id="confirm-cancel" class="btn-secondary">Cancel</button>
        <button id="confirm-ok" class="btn-danger">Delete</button>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
